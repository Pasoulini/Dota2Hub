[Metadata]
Name=Dota2Hub
Author=Parsa Rasouli
Information=Live Dota 2 Tier 1 scoreboard for Rainmeter. Displays upcoming and completed matches from Liquipedia.
License=MIT
Version=1.0.0

[Variables]
@Include=#ROOTCONFIGPATH#Data.inc
Scale=1
FontMain=Segoe UI
FontBold=Segoe UI Semibold
Text=245,247,250,255
Muted=120,130,150,255
Accent=255,120,50,255
Green=60,220,140,255
Orange=255,180,90,255
Red=255,80,80,255
Card=18,24,38,200
Panel=10,14,24,210
Line=255,255,255,18
CardH=48
CardGap=4

[Rainmeter]
Update=1000
AccurateText=1
BackgroundMode=2
SolidColor=0,0,0,1

; ==========================
; Refresh command (every 5 min)
; ==========================
[MeasureMinuteRefresh]
Measure=Time
Format=%M
IfMatch=0|5|10|15|20|25|30|35|40|45|50|55
IfMatchAction=[!Log "Dota2Hub: minute is #MeasureMinuteRefresh#, running script" Notice]["C:\Windows\System32\wscript.exe" "C:\Users\mrpra\Documents\Rainmeter\Skins\Dota2Hub\@Resources\Refresh-Dota2Hub.vbs"]
IfNotMatchAction=[!Log "Dota2Hub: minute is #MeasureMinuteRefresh#, skipping" Notice]

[MeterPanel]
Meter=Shape
Shape=Rectangle 0,0,(380*#Scale#),(#PanelH#*#Scale#) | Fill Color #Panel# | StrokeWidth 0
DynamicVariables=1

[MeterHeader]
Meter=String
Text=Dota 2
FontFace=#FontBold#
FontSize=(18*#Scale#)
FontColor=#Text#
X=(16*#Scale#)
Y=(1*#Scale#)
AntiAlias=1

[MeterSub]
Meter=String
Text=Tier 1 Matches
FontFace=#FontMain#
FontSize=(11*#Scale#)
FontColor=#Muted#
X=(16*#Scale#)
Y=(29*#Scale#)
AntiAlias=1

[MeterUpdated]
Meter=String
Text=#LastUpdated#
FontFace=#FontMain#
FontSize=(9*#Scale#)
FontColor=#Muted#
X=(360*#Scale#)
Y=(14*#Scale#)
StringAlign=Right
AntiAlias=1

[MeterUpcomingTitle]
Meter=String
Text=LIVE & UPCOMING
FontFace=#FontBold#
FontSize=(9*#Scale#)
FontColor=#Accent#
X=(16*#Scale#)
Y=(50*#Scale#)
AntiAlias=1

